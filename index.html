<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Energy Leak Audit — Into Purpose</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Cormorant+Garamond:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#F8F3EB;
    --greige:#EDE4D5;
    --ink:#221F1B;
    --taupe:#8C8377;
    --bronze:#B08D57;
    --line:#E0D6C5;
    --sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    --serif:'Cormorant Garamond',Georgia,'Times New Roman',serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--greige);
    font-family:var(--sans);
    color:var(--ink);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding:0;
  }
  .frame{
    position:relative;
    width:100%;
    max-width:460px;
    min-height:100vh;
    background:var(--cream);
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }
  @media (min-width:520px){
    body{padding:36px 16px 48px;align-items:center;}
    .frame{
      min-height:min(860px,calc(100vh - 84px));
      border-radius:30px;
      box-shadow:0 30px 70px -28px rgba(34,31,27,.32),0 2px 0 rgba(255,255,255,.4) inset;
    }
  }
  /* progress */
  .progress{
    height:3px;width:100%;background:var(--line);flex:0 0 auto;
  }
  .progress > i{
    display:block;height:100%;width:0;background:var(--bronze);
    transition:width .45s cubic-bezier(.4,0,.2,1);
  }
  .progress.hidden{visibility:hidden;}
  /* layout */
  .body{
    flex:1 1 auto;display:flex;flex-direction:column;
    padding:26px 30px 14px;
  }
  .topbar{height:26px;display:flex;align-items:center;flex:0 0 auto;}
  .back{
    border:0;background:none;cursor:pointer;font-family:var(--sans);
    font-size:13px;color:var(--taupe);letter-spacing:.02em;padding:6px 4px 6px 0;
    display:inline-flex;align-items:center;gap:7px;opacity:0;pointer-events:none;
    transition:opacity .25s ease,color .15s ease;
  }
  .back.show{opacity:1;pointer-events:auto;}
  .back:hover{color:var(--ink);}
  .back svg{width:13px;height:13px;}
  .stage{flex:1 1 auto;display:flex;flex-direction:column;justify-content:center;}
  .screen{opacity:1;transform:translateY(0);transition:opacity .22s ease,transform .22s ease;}
  .screen.out{opacity:0;transform:translateY(6px);}
  .footer{
    flex:0 0 auto;text-align:center;padding:18px 0 26px;
    font-family:var(--serif);font-size:15px;letter-spacing:.34em;
    color:var(--taupe);font-weight:600;
  }
  .footer span{padding-left:.34em;}

  /* intro */
  .intro{text-align:center;}
  .intro .lead{font-size:17.5px;line-height:1.5;font-weight:700;margin:6px 0 16px;}
  .intro p{font-size:15px;line-height:1.62;margin:0 0 15px;color:#3a352e;}
  .intro .photo{
    margin:22px auto 4px;width:100%;max-width:330px;aspect-ratio:1/1;
    border-radius:18px;overflow:hidden;background:var(--line);
  }
  .intro .photo img{width:100%;height:100%;object-fit:cover;display:block;}

  /* buttons */
  .btn{
    display:block;width:100%;border:0;cursor:pointer;font-family:var(--sans);
    font-size:15.5px;font-weight:600;letter-spacing:.01em;
    background:var(--ink);color:var(--cream);
    padding:18px 22px;border-radius:40px;margin-top:26px;
    transition:transform .12s ease,background .2s ease;
  }
  .btn:hover{background:#000;}
  .btn:active{transform:scale(.985);}
  .btn:disabled{opacity:.5;cursor:default;}

  /* questions */
  .kicker{
    display:flex;justify-content:space-between;align-items:baseline;
    font-size:11.5px;letter-spacing:.18em;color:var(--taupe);
    text-transform:uppercase;font-weight:600;margin-bottom:18px;
  }
  .q{font-size:22px;line-height:1.32;font-weight:600;margin:0 0 26px;letter-spacing:-.01em;}
  .answers{display:flex;flex-direction:column;gap:11px;}
  .answer{
    text-align:left;width:100%;cursor:pointer;font-family:var(--sans);
    font-size:15px;line-height:1.4;color:var(--ink);
    background:var(--cream);border:1px solid var(--line);
    padding:15px 18px;border-radius:30px;
    transition:background .18s ease,border-color .18s ease,color .18s ease,transform .12s ease;
  }
  .answer:hover{border-color:var(--bronze);}
  .answer:active{transform:scale(.99);}
  .answer.sel{background:var(--ink);border-color:var(--ink);color:var(--cream);}

  /* email gate */
  .gate{text-align:center;}
  .gate .kick{font-size:11.5px;letter-spacing:.2em;color:var(--bronze);text-transform:uppercase;font-weight:600;margin-bottom:14px;}
  .gate h2{font-size:25px;line-height:1.22;font-weight:600;margin:0 0 12px;letter-spacing:-.01em;}
  .gate .sub{font-size:14.5px;line-height:1.55;color:var(--taupe);margin:0 auto 22px;max-width:300px;}
  .gate input{
    width:100%;font-family:var(--sans);font-size:16px;text-align:center;color:var(--ink);
    background:#fff;border:1px solid var(--line);border-radius:30px;padding:16px 18px;
    transition:border-color .18s ease;outline:none;
  }
  .gate input::placeholder{color:#b9b0a3;}
  .gate input:focus{border-color:var(--bronze);}
  .gate input.err{border-color:#c0563f;}
  .consent{font-size:11.5px;line-height:1.5;color:var(--taupe);margin:16px auto 0;max-width:320px;}

  /* result */
  .result .kick{font-size:11.5px;letter-spacing:.2em;color:var(--bronze);text-transform:uppercase;font-weight:600;margin-bottom:12px;text-align:center;}
  .result h2{font-size:26px;line-height:1.2;font-weight:600;margin:0 0 26px;letter-spacing:-.01em;text-align:center;}
  .leak{margin-bottom:20px;}
  .leak .row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
  .leak .name{font-size:15.5px;font-weight:600;}
  .leak .pct{font-size:15px;font-weight:600;color:var(--ink);font-variant-numeric:tabular-nums;}
  .bar{height:7px;background:var(--line);border-radius:6px;overflow:hidden;}
  .bar > i{display:block;height:100%;width:0;background:var(--bronze);border-radius:6px;transition:width .9s cubic-bezier(.32,.72,.28,1);}
  .leak .desc{font-size:12.5px;line-height:1.45;color:var(--taupe);margin-top:8px;}
  .explain{margin-top:34px;text-align:center;}
  .explain .arrow{display:block;margin:0 auto 6px;width:30px;height:30px;color:var(--bronze);}
  .explain a{font-size:17px;font-weight:600;color:var(--ink);text-decoration:underline;text-underline-offset:4px;text-decoration-thickness:1.5px;}
  .explain a:hover{color:var(--bronze);}
  .explain .note{display:block;font-size:12px;color:var(--taupe);margin-top:9px;}

  @media (prefers-reduced-motion:reduce){
    *{transition:none !important;}
  }
  :focus-visible{outline:2px solid var(--bronze);outline-offset:2px;}
</style>
</head>

    <div class="progress hidden" id="prog"><i id="progFill"></i></div>

      <div class="topbar">
        <button class="back" id="backBtn" type="button" aria-label="Go back">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
          Back
        </button>
      </div>
      <div class="stage"><div class="screen" id="screen"></div></div>
      <div class="footer">OH WONDERFUL<span>.</span></div>
    </div>
  </main>

    setProgress(false,0);
    transition(function(){
      return ''
      + '<div class="intro">'
      +   '<p class="lead">Most business problems are not strategy problems. They are energy problems.</p>'
      +   '<p>You are operating from the state of your nervous system, your energy type and your unresolved patterns, which determines what you attract, what you can hold, and what you are able to expand into. And your clients feel it.</p>'
      +   '<p>This audit identifies the five places energy leaks quietly and expensively in your conscious business.</p>'
      +   '<p>Take a few minutes of your time and create lasting change by identifying your gaps.</p>'
      +   '<div class="photo"><img src="'+PHOTO+'" alt="Into Purpose"></div>'
      +   '<button class="btn" id="startBtn" type="button">Start the quiz now</button>'
      + '</div>';
    }, function(){
      document.getElementById("startBtn").addEventListener("click", function(){
        state.view="question"; state.qi=0; renderQuestion();
      });
    });
  }

  function renderQuestion(){
    var qi = state.qi;
    var q = QUESTIONS[qi];
    showBack(true);
    setProgress(true, (qi)/QUESTIONS.length);
    transition(function(){
      var num = String(qi+1).padStart(2,"0");
      var html = ''
        + '<div class="question">'
        +   '<div class="kicker"><span>Question '+num+'</span><span>'+num+' / 10</span></div>'
        +   '<h1 class="q">'+esc(q.text)+'</h1>'
        +   '<div class="answers">';
      for(var i=0;i<q.answers.length;i++){
        var sel = state.answers[qi]===i ? ' sel' : '';
        html += '<button class="answer'+sel+'" type="button" data-score="'+i+'">'+esc(q.answers[i])+'</button>';
      }
      html += '</div></div>';
      return html;
    }, function(){
      setProgress(true, (qi+0.5)/QUESTIONS.length);
      var btns = screenEl.querySelectorAll(".answer");
      Array.prototype.forEach.call(btns, function(b){
        b.addEventListener("click", function(){
          var score = parseInt(b.getAttribute("data-score"),10);
          state.answers[qi] = score;
          Array.prototype.forEach.call(btns, function(x){ x.classList.remove("sel"); });
          b.classList.add("sel");
          setProgress(true, (qi+1)/QUESTIONS.length);
          setTimeout(function(){
            if(qi < QUESTIONS.length-1){ state.qi = qi+1; renderQuestion(); }
            else { state.view="gate"; renderGate(); }
          }, 300);
        });
      });
    });
  }

  function renderGate(){
    showBack(true);
    setProgress(true, 1);
    transition(function(){
      return ''
      + '<div class="gate">'
      +   '<div class="kick">One last step</div>'
      +   '<h2>Enter your email to unlock your result</h2>'
      +   '<p class="sub">Your full energy leak profile appears on the next screen.</p>'
      +   '<input id="email" type="email" inputmode="email" autocomplete="email" placeholder="your@email.com" aria-label="Email address">'
      +   '<button class="btn" id="revealBtn" type="button">Reveal my result</button>'
      +   '<p class="consent">By entering your email you agree to receive emails from Into Purpose. No spam. Unsubscribe anytime.</p>'
      + '</div>';
    }, function(){
      var input = document.getElementById("email");
      var btn = document.getElementById("revealBtn");
      function submit(){
        var val = (input.value||"").trim();
        if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val)){
          input.classList.add("err"); input.focus(); return;
        }
        input.classList.remove("err");
        btn.disabled = true;
        sendEmail(val);              // fire-and-forget, never blocks the result
        state.view="result"; renderResult();
      }
      btn.addEventListener("click", submit);
      input.addEventListener("keydown", function(e){ if(e.key==="Enter") submit(); });
      input.addEventListener("input", function(){ input.classList.remove("err"); });
      input.focus();
    });
  }

  function sendEmail(email){
    state.submitted = true;
    try{
      var ctrl = new AbortController();
      var t = setTimeout(function(){ ctrl.abort(); }, 6000);
      fetch(SUBSCRIBE_ENDPOINT, {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({ email:email }),
        signal:ctrl.signal,
        keepalive:true
      }).then(function(){ clearTimeout(t); })
        .catch(function(err){ clearTimeout(t); /* silent */ });
    }catch(e){ /* silent */ }
  }

  function computeLeaks(){
    var out = [];
    for(var l=0;l<5;l++){
      var pts = (state.answers[l*2]||0) + (state.answers[l*2+1]||0); // 0..6
      var pct = Math.round(pts/6*100);
      out.push({ name:LEAKS[l].name, desc:LEAKS[l].desc, pct:pct });
    }
    out.sort(function(a,b){ return b.pct - a.pct; });
    return out;
  }

  function renderResult(){
    showBack(false);
    setProgress(false, 1);
    var leaks = computeLeaks();
    transition(function(){
      var rows = leaks.map(function(k){
        return ''
        + '<div class="leak">'
        +   '<div class="row"><span class="name">'+esc(k.name)+'</span><span class="pct">'+k.pct+'%</span></div>'
        +   '<div class="bar"><i data-w="'+k.pct+'"></i></div>'
        +   '<div class="desc">'+esc(k.desc)+'</div>'
        + '</div>';
      }).join("");
      return ''
      + '<div class="result">'
      +   '<div class="kick">Your energy leak profile</div>'
      +   '<h2>Here\u2019s where you\u2019re leaking</h2>'
      +   rows
      +   '<div class="explain">'
      +     '<svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4v13"/><path d="M6 11l6 6 6-6"/></svg>'
      +     '<a href="'+PDF_LINK+'" target="_blank" rel="noopener">Full Explanation</a>'
      +     '<span class="note">The full breakdown of your five leaks (PDF)</span>'
      +   '</div>'
      + '</div>';
    }, function(){
      // animate bars
      requestAnimationFrame(function(){
        requestAnimationFrame(function(){
          var bars = screenEl.querySelectorAll(".bar > i");
          Array.prototype.forEach.call(bars, function(b){
            b.style.width = b.getAttribute("data-w") + "%";
          });
        });
      });
    });
  }

  backBtn.addEventListener("click", function(){
    if(state.view==="question"){
      if(state.qi>0){ state.qi--; renderQuestion(); }
      else { state.view="intro"; renderIntro(); }
    } else if(state.view==="gate"){
      state.view="question"; state.qi=QUESTIONS.length-1; renderQuestion();
    }
  });

  renderIntro();
})();
</script>
</body>
</html>
